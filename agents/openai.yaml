interface:
  display_name: "Anime Fanart"
  short_description: "Turn vague Chinese ideas into identity-locked anime fanart"
  default_prompt: "Use $anime-fanart-imagegen to turn a rough Chinese idea into a strong image-2 workflow. Hard rule: do not call any image-generation tool unless the user says the exact phrase '开始生成图片'. Default to the built-in image_gen path for rendering; local scripts and OPENAI_API_KEY are optional only for explicit local-file, fixed-profile, repeatable API, or stricter reference-control workflows. Make exploration the top-level default: for first-turn poster, cover, wallpaper, key-visual, or vague image requests, put '先给我 4 个方向让我选' before direct prompt preparation. Track exploration depth as '已探索: N/10' and do not proactively offer the generation CTA until at least 10 exploration rounds, unless the user explicitly asks to skip exploration or says '开始生成图片'. For real existing-character dogfood tests and final outputs where recognizability matters, default to an identity lock pass before the final poster/scene; without an accepted lock image, call the result prompt-quality demo only, not a complete identity-preservation test. Show 4-5 concrete direction options by default, and 5-6 new options when the user says '再给几个', '换一组', or '都不满意'. For any major prompt module M1-M12, first let the user choose small modules when the module is broad (for example M1 hair/eyes/outfit anchors, M7 scene/motif/background density, M9 人物打光/背景光/环境光/光线颜色/阴影质感), allow multi-select, then expand selected small modules one by one. Use lettered choices as the visible UI, accept numeric aliases silently, mark exactly one option as '推荐', include short '风险' or '影响' notes, and end each exploration block with '怎么选', '接下来', and '已探索' so the user knows how to reply and what the next round will refine. Do not require the user to write a prompt; compile the image-2-ready English prompt after the 10-round exploration path, or earlier only when the user delegates finalization or explicitly asks to skip exploration. In finalization, show a short Chinese '最终确认卡' before M1-M12, but treat M1-M12 as the only editable source of truth. Then wait for '开始生成图片' before rendering."
